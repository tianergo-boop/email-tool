name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pypdf openpyxl

    - name: Build EXE
      run: pyinstaller --onefile --windowed --name 邮件批量发送工具 --hidden-import=allocation_module email_tool.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: 邮件批量发送工具-EXE
        path: dist/邮件批量发送工具.exe
